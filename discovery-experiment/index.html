<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discovery Mode Experiment</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: #1a1a2e;
      background: #f4f6fb;
      padding: 24px;
      min-width: 1024px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #2d3561;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Controls ──────────────────────────────────────────────── */
    .controls {
      background: #fff;
      border: 1px solid #dde2f0;
      border-radius: 10px;
      padding: 20px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-group label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select, input[type="text"] {
      height: 38px;
      padding: 0 10px;
      border: 1px solid #c7cde3;
      border-radius: 6px;
      font-size: 14px;
      color: #1a1a2e;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input[type="text"]:focus {
      border-color: #4f6ef7;
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.12);
    }

    #model-select   { width: 240px; }
    #test-select    { width: 300px; }
    #custom-input   { width: 320px; }

    .btn {
      height: 38px;
      padding: 0 18px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #4f6ef7;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #3a57e8;
    }

    .btn-secondary {
      background: #e8ecff;
      color: #4f6ef7;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #d6dcff;
    }

    .controls-actions {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding-bottom: 1px;
    }

    /* ── Two-panel output ─────────────────────────────────────── */
    .panels {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .panel {
      flex: 1 1 50%;
      background: #fff;
      border: 1px solid #dde2f0;
      border-radius: 10px;
      padding: 20px 24px;
      min-height: 200px;
    }

    .panel-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f2fa;
    }

    #standard-panel .panel-title { color: #2d8a4e; border-color: #c6f0d7; }
    #discovery-panel .panel-title { color: #5a43c8; border-color: #e0d8ff; }

    .panel-body {
      min-height: 140px;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #888;
      font-style: italic;
    }

    .spinner {
      animation: spin 1s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .error-msg {
      color: #c0392b;
      background: #fdf0ee;
      border: 1px solid #f5c6c0;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
    }

    .answer-text {
      font-size: 15px;
      color: #1a1a2e;
      word-break: break-word;
    }

    .answer-notes {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
    }

    /* Discovery panel specifics */
    .hypothesis-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .hypothesis-item {
      background: #f9f8ff;
      border: 1px solid #e0d8ff;
      border-radius: 7px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .hypothesis-item.winner {
      background: #f0ecff;
      border-color: #a594f9;
      box-shadow: 0 0 0 2px #a594f940;
    }

    .hypothesis-guess {
      flex: 1;
      font-size: 14px;
      color: #1a1a2e;
    }

    .hypothesis-score {
      font-size: 13px;
      font-weight: 700;
      color: #5a43c8;
      white-space: nowrap;
      background: #e8e2ff;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .winner-badge {
      display: inline-block;
      margin-left: 6px;
      font-size: 11px;
      font-weight: 700;
      background: #5a43c8;
      color: #fff;
      padding: 1px 7px;
      border-radius: 20px;
      vertical-align: middle;
    }

    .discovery-summary {
      border-top: 1px solid #f0f2fa;
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
    }

    .discovery-summary .label {
      font-weight: 600;
      color: #555;
      min-width: 110px;
      display: inline-block;
    }

    .confidence-bar-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      vertical-align: middle;
    }

    .confidence-bar {
      width: 100px;
      height: 8px;
      background: #e0d8ff;
      border-radius: 4px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      background: #5a43c8;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* ── Results summary table ───────────────────────────────── */
    .results-section {
      background: #fff;
      border: 1px solid #dde2f0;
      border-radius: 10px;
      padding: 20px 24px;
    }

    .results-section h2 {
      margin-bottom: 14px;
    }

    .no-results {
      color: #888;
      font-style: italic;
      padding: 10px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      background: #f0f2fa;
      padding: 9px 14px;
      text-align: left;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #555;
      border-bottom: 2px solid #dde2f0;
    }

    tbody tr:nth-child(even) {
      background: #f8f9fd;
    }

    tbody tr:hover {
      background: #eef1fb;
    }

    tbody td {
      padding: 9px 14px;
      border-bottom: 1px solid #eef0f8;
      color: #1a1a2e;
    }

    .better-yes  { color: #2d8a4e; font-weight: 700; }
    .better-no   { color: #c0392b; font-weight: 700; }
    .better-null { color: #888; }

    .status-banner {
      margin-top: 14px;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      background: #fff8e1;
      border: 1px solid #ffe082;
      color: #7a5800;
    }
  </style>
</head>
<body>

  <h1>Discovery Mode Experiment</h1>

  <!-- ── Controls ────────────────────────────────────────────── -->
  <div class="controls">
    <div class="control-group">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="">Loading models…</option>
      </select>
    </div>

    <div class="control-group">
      <label for="test-select">Test Case</label>
      <select id="test-select">
        <option value="">Loading test cases…</option>
      </select>
    </div>

    <div class="control-group">
      <label for="custom-input">Custom Input</label>
      <input
        type="text"
        id="custom-input"
        maxlength="1000"
        placeholder="Or enter custom input…"
        autocomplete="off"
      />
    </div>

    <div class="controls-actions">
      <button class="btn btn-primary" id="run-single-btn">Run Single</button>
      <button class="btn btn-secondary" id="run-all-btn">Run All Tests</button>
    </div>
  </div>

  <!-- ── Two-panel output ─────────────────────────────────────── -->
  <div class="panels">
    <!-- Standard Mode -->
    <div class="panel" id="standard-panel">
      <div class="panel-title">Standard Mode</div>
      <div class="panel-body" id="standard-output">
        <span class="loading" style="color:#aaa;font-style:normal;">Results will appear here after running a test.</span>
      </div>
    </div>

    <!-- Discovery Mode -->
    <div class="panel" id="discovery-panel">
      <div class="panel-title">Discovery Mode</div>
      <div class="panel-body" id="discovery-output">
        <span class="loading" style="color:#aaa;font-style:normal;">Results will appear here after running a test.</span>
      </div>
    </div>
  </div>

  <!-- ── Results summary ─────────────────────────────────────── -->
  <div class="results-section">
    <h2>Results Summary</h2>
    <div id="results-container">
      <p class="no-results">No results available yet. Run tests to populate.</p>
    </div>
  </div>

  <script>
    'use strict';

    // ── DOM refs ────────────────────────────────────────────────
    const modelSelect    = document.getElementById('model-select');
    const testSelect     = document.getElementById('test-select');
    const customInput    = document.getElementById('custom-input');
    const runSingleBtn   = document.getElementById('run-single-btn');
    const runAllBtn      = document.getElementById('run-all-btn');
    const standardOutput = document.getElementById('standard-output');
    const discoveryOutput= document.getElementById('discovery-output');
    const resultsContainer = document.getElementById('results-container');

    // ── Helpers ─────────────────────────────────────────────────

    function setLoading(el, message) {
      el.innerHTML = `<span class="loading"><span class="spinner">⏳</span> ${escapeHtml(message)}</span>`;
    }

    function showError(el, message) {
      el.innerHTML = `<div class="error-msg">⚠️ ${escapeHtml(message)}</div>`;
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function setButtons(disabled) {
      runSingleBtn.disabled = disabled;
      runAllBtn.disabled    = disabled;
    }

    // ── Render helpers ──────────────────────────────────────────

    function renderStandard(result) {
      if (!result) {
        showError(standardOutput, 'No result returned.');
        return;
      }
      if (result.error) {
        showError(standardOutput, `Error (${result.error.code || 'unknown'}): ${result.error.reason || 'Unknown error'}`);
        return;
      }
      let html = `<div class="answer-text">${escapeHtml(result.answer || '(empty response)')}</div>`;
      if (result.notes) {
        html += `<div class="answer-notes">${escapeHtml(result.notes)}</div>`;
      }
      standardOutput.innerHTML = html;
    }

    function renderDiscovery(result) {
      if (!result) {
        showError(discoveryOutput, 'No result returned.');
        return;
      }
      if (result.error) {
        showError(discoveryOutput, `Error (${result.error.code || 'unknown'}): ${result.error.reason || 'Unknown error'}`);
        return;
      }

      const hypotheses  = result.hypotheses  || [];
      const validations = result.validations || [];
      const winnerId    = result.winner_id;

      // Build a map of id→score for quick lookup
      const scoreMap = {};
      for (const v of validations) {
        scoreMap[v.id] = v.score;
      }

      // Hypothesis list
      let hypoHtml = '<ul class="hypothesis-list">';
      for (const h of hypotheses) {
        const score   = scoreMap[h.id] != null ? scoreMap[h.id] : '—';
        const isWinner= h.id === winnerId;
        const cls     = isWinner ? 'hypothesis-item winner' : 'hypothesis-item';
        const badge   = isWinner ? '<span class="winner-badge">✓ Winner</span>' : '';
        hypoHtml += `
          <li class="${cls}">
            <span class="hypothesis-guess">${escapeHtml(h.guess)}${badge}</span>
            <span class="hypothesis-score">Score: ${escapeHtml(String(score))}</span>
          </li>`;
      }
      hypoHtml += '</ul>';

      // Summary
      const confidence = result.confidence != null ? result.confidence : '—';
      const confPct    = result.confidence != null ? result.confidence : 0;
      const summaryHtml = `
        <div class="discovery-summary">
          <div><span class="label">Final Answer:</span> ${escapeHtml(result.final_answer || '(none)')}</div>
          <div>
            <span class="label">Confidence:</span>
            <span class="confidence-bar-wrap">
              <span class="confidence-bar">
                <span class="confidence-fill" style="width:${confPct}%"></span>
              </span>
              ${escapeHtml(String(confidence))}%
            </span>
          </div>
          <div><span class="label">Winner ID:</span> #${escapeHtml(String(winnerId != null ? winnerId : '—'))}</div>
        </div>`;

      discoveryOutput.innerHTML = hypoHtml + summaryHtml;
    }

    // ── Results table ───────────────────────────────────────────

    const ROUNDS = ['abbreviations', 'vague_terms', 'code_concepts', 'trick_ambiguous'];

    function computeWinRate(records, round, mode) {
      // Filter by round
      const filtered = records.filter(r => r.round === round);
      if (filtered.length === 0) return null;

      // Get per-record correct value for the mode
      const values = filtered
        .map(r => (mode === 'standard' ? r.standard && r.standard.correct : r.discovery && r.discovery.correct))
        .filter(v => v !== null && v !== undefined);

      if (values.length === 0) return null;
      const correct = values.filter(v => v === true).length;
      return (correct / values.length) * 100;
    }

    function renderResultsTable(records) {
      if (!Array.isArray(records) || records.length === 0) {
        resultsContainer.innerHTML = '<p class="no-results">No results available yet. Run tests to populate.</p>';
        return;
      }

      // Determine current model filter
      const selectedModel = modelSelect.value;

      // Filter by selected model if set
      const filtered = selectedModel
        ? records.filter(r => r.model === selectedModel)
        : records;

      if (filtered.length === 0) {
        resultsContainer.innerHTML = '<p class="no-results">No results for the selected model yet. Run tests to populate.</p>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Round</th>
              <th>Standard %</th>
              <th>Discovery %</th>
              <th>Discovery Better?</th>
            </tr>
          </thead>
          <tbody>`;

      let anyData = false;
      for (const round of ROUNDS) {
        const stdRate  = computeWinRate(filtered, round, 'standard');
        const discRate = computeWinRate(filtered, round, 'discovery');

        if (stdRate === null && discRate === null) continue;
        anyData = true;

        const stdStr  = stdRate  != null ? stdRate.toFixed(1)  + '%' : '—';
        const discStr = discRate != null ? discRate.toFixed(1) + '%' : '—';

        let betterStr = '—';
        let betterCls = 'better-null';
        if (stdRate != null && discRate != null) {
          if (discRate > stdRate) {
            betterStr = 'Yes ↑';
            betterCls = 'better-yes';
          } else if (discRate < stdRate) {
            betterStr = 'No ↓';
            betterCls = 'better-no';
          } else {
            betterStr = 'Tie';
            betterCls = 'better-null';
          }
        }

        const label = round.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        html += `
            <tr>
              <td>${escapeHtml(label)}</td>
              <td>${escapeHtml(stdStr)}</td>
              <td>${escapeHtml(discStr)}</td>
              <td class="${betterCls}">${escapeHtml(betterStr)}</td>
            </tr>`;
      }

      html += '</tbody></table>';

      if (!anyData) {
        resultsContainer.innerHTML = '<p class="no-results">No results available yet. Run tests to populate.</p>';
        return;
      }

      // Add total record count footnote
      html += `<p style="margin-top:10px;font-size:12px;color:#888;">${filtered.length} result record(s) loaded${selectedModel ? ' for model: ' + escapeHtml(selectedModel) : ''}.</p>`;
      resultsContainer.innerHTML = html;
    }

    // ── API calls ───────────────────────────────────────────────

    async function fetchModels() {
      try {
        const res = await fetch('/api/models');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const models = data.models || [];
        modelSelect.innerHTML = '';
        if (models.length === 0) {
          modelSelect.innerHTML = '<option value="">No models available</option>';
          return;
        }
        for (const m of models) {
          const opt = document.createElement('option');
          opt.value       = m.id;
          opt.textContent = m.label;
          modelSelect.appendChild(opt);
        }
      } catch (err) {
        modelSelect.innerHTML = '<option value="">Error loading models</option>';
        console.error('fetchModels error:', err);
      }
    }

    async function fetchTestCases() {
      try {
        const res = await fetch('/tests/test_cases.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const cases = await res.json();
        testSelect.innerHTML = '<option value="">-- select a test case --</option>';
        for (const tc of cases) {
          const opt = document.createElement('option');
          opt.value       = tc.input;
          opt.textContent = `${tc.test_id}: ${tc.input}`;
          testSelect.appendChild(opt);
        }
      } catch (err) {
        testSelect.innerHTML = '<option value="">Error loading test cases</option>';
        console.error('fetchTestCases error:', err);
      }
    }

    async function fetchResults() {
      try {
        const res = await fetch('/api/results');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const records = await res.json();
        renderResultsTable(records);
      } catch (err) {
        resultsContainer.innerHTML = '<p class="no-results">Could not load results.</p>';
        console.error('fetchResults error:', err);
      }
    }

    // ── Event handlers ──────────────────────────────────────────

    runSingleBtn.addEventListener('click', async () => {
      const custom = customInput.value.trim();
      const input  = custom || testSelect.value;
      const model  = modelSelect.value;

      if (!input) {
        alert('Please select a test case or enter custom input.');
        return;
      }
      if (!model) {
        alert('Please select a model.');
        return;
      }

      setButtons(true);
      setLoading(standardOutput, 'Running…');
      setLoading(discoveryOutput, 'Running…');

      try {
        const res = await fetch('/api/run-single', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ input, model }),
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          const msg = errData.error || `HTTP ${res.status}`;
          showError(standardOutput,  `Server error: ${msg}`);
          showError(discoveryOutput, `Server error: ${msg}`);
        } else {
          const data = await res.json();
          renderStandard(data.standard);
          renderDiscovery(data.discovery);
        }
      } catch (err) {
        showError(standardOutput,  `Network error: ${err.message}`);
        showError(discoveryOutput, `Network error: ${err.message}`);
      } finally {
        setButtons(false);
        // Refresh summary
        await fetchResults();
      }
    });

    runAllBtn.addEventListener('click', async () => {
      const model = modelSelect.value;
      if (!model) {
        alert('Please select a model.');
        return;
      }

      setButtons(true);

      // Show progress in panels
      setLoading(standardOutput,  'Running all 20 tests…');
      setLoading(discoveryOutput, 'Running all 20 tests…');

      // Replace summary with banner
      resultsContainer.innerHTML = '<div class="status-banner">⏳ Running all 20 tests… this may take a while.</div>';

      try {
        const res = await fetch('/api/run-all', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ model }),
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          const msg = errData.error || `HTTP ${res.status}`;
          showError(standardOutput,  `Server error: ${msg}`);
          showError(discoveryOutput, `Server error: ${msg}`);
          resultsContainer.innerHTML = `<p class="no-results">Run All failed: ${escapeHtml(msg)}</p>`;
        } else {
          const data = await res.json();

          // Show a summary in each panel indicating completion
          standardOutput.innerHTML  = '<div class="answer-text">✅ All tests completed. See Results Summary below.</div>';
          discoveryOutput.innerHTML = '<div class="answer-text">✅ All tests completed. See Results Summary below.</div>';

          // Render from response first (fastest)
          if (data.results && data.results.length > 0) {
            renderResultsTable(data.results);
          }
        }
      } catch (err) {
        showError(standardOutput,  `Network error: ${err.message}`);
        showError(discoveryOutput, `Network error: ${err.message}`);
        resultsContainer.innerHTML = `<p class="no-results">Run All failed: ${escapeHtml(err.message)}</p>`;
      } finally {
        setButtons(false);
        // Always refresh from canonical server source
        await fetchResults();
      }
    });

    // Refresh table when model selection changes
    modelSelect.addEventListener('change', async () => {
      await fetchResults();
    });

    // ── Page load ───────────────────────────────────────────────

    (async function init() {
      await Promise.all([
        fetchModels(),
        fetchTestCases(),
        fetchResults(),
      ]);
    })();
  </script>
</body>
</html>
